name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel in-progress duplicate runs on PR pushes. On main-branch pushes,
# let runs complete so we always have a full CI record.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[all,dev]"
      - name: Run tests
        run: pytest tests/ -v
      - name: Lint
        run: ruff check truememory/ tests/

  # Hunter F26: catch packaging regressions (missing py.typed, metadata
  # errors, broken README rendering, sdist contents) in CI instead of
  # at release time. Runs once on 3.12 only — duplicating across the
  # matrix wastes CI minutes without additional signal.
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify package metadata
        run: twine check --strict dist/*
