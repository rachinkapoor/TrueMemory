name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

# Cancel in-progress duplicate runs on PR pushes. On main-branch pushes,
# let runs complete so we always have a full CI record.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        # Issue #426: PIP_CONSTRAINT pins resolution to constraints.txt so the
        # dependency graph (esp. the numpy/torch/transformers numeric stack) is
        # reproducible run-to-run instead of drifting to whatever is newest.
        env:
          PIP_CONSTRAINT: constraints.txt
        run: pip install -e ".[all,dev]"
      - name: Run tests (gate — deterministic, no network)
        # Issue #426: exclude `network`-marked tests (real HuggingFace model
        # downloads) from the gate so a transient HfHubHTTPError can't fail CI
        # or block a release. Coverage is preserved by the non-gating
        # network-tests job below.
        env:
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
        run: pytest tests/ -v -m "not network"
      - name: Lint
        run: ruff check truememory/ tests/

  # Issue #426: model-download tests run here, isolated from the gate. This job
  # exercises real HuggingFace downloads so coverage is NOT weakened, but a
  # network flake here does not block PRs or releases (continue-on-error).
  network-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        env:
          PIP_CONSTRAINT: constraints.txt
        run: pip install -e ".[all,dev]"
      - name: Run network-marked tests
        run: pytest tests/ -v -m "network"

  # Hunter F26: catch packaging regressions (missing py.typed, metadata
  # errors, broken README rendering, sdist contents) in CI instead of
  # at release time. Runs once on 3.12 only — duplicating across the
  # matrix wastes CI minutes without additional signal.
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml
      - name: Install build tooling
        run: pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Verify package metadata
        run: twine check --strict dist/*
